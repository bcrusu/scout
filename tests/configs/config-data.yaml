# Config options are defined in github.com/bcrusu/scouot/internal/data/server/config/config.go

clusterName: will_be_set_at_runtime
dataDir: /storage/data/
discovery:
  servers:
    - will_be_set_at_runtime
logLevels: "*:info,hraft:error,rpc_logger:error,txn:error"
transactions:
  retryPolicy:
    backoff:
      minDelay: 50ms
      maxDelay: 200ms
