syntax = "proto3";

package storage;

option go_package = "internal/control/server/storage";

import "google/protobuf/timestamp.proto";

message Command {
    oneof payload {
        Bootstrap bootstrap = 1;
        Register register = 2;
    }
}

message Bootstrap {
    message Server {
        uint64 id = 1;
        string name = 2;
        string address = 3;
    }

    string cluster_name = 1;
    repeated Server servers = 2;
}

message Register {
    ServerType type = 1;

    // Unique token.
    string token = 2;

    // The addres where the server will be contacted. 
    string address = 3;
}

message Snapshot {
    uint64 index = 1;
    string cluster_name = 2;
    uint64 last_server_id = 3;
    google.protobuf.Timestamp created_time = 4;
    map<string, uint64> tokens = 5;
    Servers servers = 6;
    Partitions partitions = 7;
}

enum ServerType {
    Unknown = 0;
    Control = 1;
    Data = 2;
    Api = 3;
}

message Server {
    uint64 version = 1;
    uint64 id = 2;
    string name = 3;
    ServerType type = 4;
    google.protobuf.Timestamp first_seen = 5;
    google.protobuf.Timestamp last_seen = 6;
    string last_address = 7;
}

message Servers {
    uint64 version = 1;
    map<uint64, Server> items = 2;
}

// Partition represents a data storage partition/shard which has a one-to-one
// mapping to a multiraft replication group. Each partition contains its assigned
// members and thir placement to servers.
message Partition {
    message Member {
        string name = 1;
        uint64 server_id = 2;
        bool voter = 3;
    }

    uint64 version = 1;
    uint64 id = 2;
    string group_name = 3;
    Member group_members = 4;
    uint64 next_unique = 5;
}

message Partitions {
    uint64 version = 1;
    map<uint64, Partition> items = 2;
}
