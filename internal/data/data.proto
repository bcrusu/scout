syntax = "proto3";

package data;

option go_package = "internal/data";

// Service represents the data storage service.
service Service {
    rpc Get(GetRequest) returns (GetResponse);
    rpc Set(SetRequest) returns (SetResponse);
    rpc Del(DelRequest) returns (DelResponse); 
}

message SetRequest {
    uint64 keyspace = 1;
    bytes key = 2;
    bytes value = 3;
}

message SetResponse {}

message GetRequest {
    uint64 keyspace = 1;
    bytes key = 2;
}

message GetResponse {
    bytes value = 1;
}

message DelRequest {
    uint64 keyspace = 1;
    bytes key = 2;
}

message DelResponse {
}

