syntax = "proto3";

package data;

option go_package = "internal/data";

// Data represents the data storage service.
service Data {
    rpc Get(GetRequest) returns (GetResponse);
    rpc Set(SetRequest) returns (SetResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse); 
}

message SetRequest {
    // TODO: string "keyspace"
    bytes key = 1;
    bytes value = 2;
}

message SetResponse {}

message GetRequest {
    bytes key = 1;
}

message GetResponse {
    bytes value = 1;
}

message DeleteRequest {
    bytes key = 1;
}

message DeleteResponse {
}

