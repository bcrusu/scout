syntax = "proto3";

package data.storage;

option go_package = "github.com/bcrusu/scout/internal/data/server/storage";

import "internal/data/server/txn/txn.proto";

message Command {
    oneof payload {
        txn.Batch batch = 1;
    }
}

message Snapshot {
    uint64 index = 1;
    txn.Snapshot txn_snapshot = 2;
}
