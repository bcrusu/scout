syntax = "proto3";

package storage;

option go_package = "internal/data/server/storage";

message Command {
    oneof payload {
        Set set = 1;
        Delete delete = 2;
    }
}

message Snapshot {
    uint64 version = 1;
    map<string, bytes> items = 2;
}

message Set {
    uint64 keyspace = 1;
    bytes key = 2;
    bytes value = 3;
}

message Delete {
    uint64 keyspace = 1;
    bytes key = 2;
}
