syntax = "proto3";

package data.storage;

option go_package = "github.com/bcrusu/scout/internal/data/server/storage";

import "internal/data/data.proto";

message Command {
    oneof payload {
        data.TxnBatch txn_batch = 1;
    }
}

message Snapshot {
    uint64 index = 1;
    data.TxnSnapshot txn_snapshot = 2;
}
