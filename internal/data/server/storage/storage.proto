syntax = "proto3";

package data.storage;

option go_package = "internal/data/server/storage";

message Command {
    // [optional] The FSM checks its current version with the one
    // provided here and rejects the write if they do not match.
    uint64 if_match = 1;

    uint32 partition_id = 2;

    oneof payload {
        Set set = 3;
        Delete delete = 4;
    }
}

message Keyspace {
    message KV {
        bytes key = 1;
        bytes value = 2;
    }

    repeated KV items = 1;
}

message Snapshot {
    uint64 index = 1;
    uint64 version = 2;
    map<uint64, Keyspace> keyspaces = 3;
}

message Set {
    uint64 keyspace = 1;
    bytes key = 2;
    bytes value = 3;
}

message Delete {
    uint64 keyspace = 1;
    bytes key = 2;
}
