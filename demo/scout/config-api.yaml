# Config options are defined in github.com/bcrusu/scouot/internal/api/server/config/config.go

clusterName: demo
dataDir: /scout/storage/
proxyMode: true
discovery:
  servers:
    - control1
    - control2
    - control3
logLevels: "*:info,hraft:error,rpc_logger:error"
metrics:
  exportEndpoint: otelcol:4317
retryPolicy:
  maxAttempts: 3
  backoff:
    minDelay: 50ms
    maxDelay: 200ms
