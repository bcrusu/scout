# Config options are defined in github.com/bcrusu/scouot/internal/data/server/config/config.go

clusterName: demo
dataDir: /scout/storage/
discovery:
  servers:
    - control1
    - control2
    - control3
logLevels: "*:info,hraft:error,rpc_logger:error"
metrics:
  exportEndpoint: otelcol:4317
transactions:
  retryPolicy:
    backoff:
      minDelay: 50ms
      maxDelay: 200ms
